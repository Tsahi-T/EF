<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הלילה שלנו</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:      #0A0A0A;
      --crim:    #8B1A2A;
      --crim2:   #B83050;
      --text:    #E0D5D0;
      --dim:     #70605A;
      --cbg:     rgba(255,255,255,.03);
      --cbrd:    rgba(139,26,42,.22);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway','Segoe UI',sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ambient glow ── */
    .amb {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 55% 38% at 18% 14%, rgba(139,26,42,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 82% 86%, rgba(100,15,25,.13) 0%, transparent 70%);
    }

    /* ── floating hearts ── */
    .hbg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .hrt {
      position:absolute; opacity:0;
      animation:floatHrt linear infinite;
      pointer-events:none; user-select:none;
    }
    @keyframes floatHrt {
      0%   { transform:translateY(110vh) rotate(-15deg) scale(.35); opacity:0; }
      8%   { opacity:.5; }
      92%  { opacity:.2; }
      100% { transform:translateY(-15vh) rotate(15deg) scale(1.05); opacity:0; }
    }

    /* ── confetti ── */
    #cc { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
    .cp { position:absolute; top:-16px; animation:cpFall linear forwards; }
    @keyframes cpFall { to { transform:translateY(112vh) rotate(620deg); opacity:0; } }

    /* ── layout ── */
    .page {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      padding: clamp(22px,5vw,38px) 16px clamp(44px,8vw,68px);
      gap: clamp(26px,5vw,36px);
      max-width: 480px; margin: 0 auto;
    }

    /* ── hero ── */
    .hero { display:flex; flex-direction:column; align-items:center; gap:clamp(10px,3vw,14px); text-align:center; }

    .ring {
      position:relative;
      width: clamp(108px,32vw,168px);
      aspect-ratio:1;
    }
    .ring::before {
      content:''; position:absolute; inset:-4px; border-radius:50%;
      background: conic-gradient(
        var(--crim) 0deg, #3A1018 55deg,
        var(--crim2) 110deg, #3A1018 165deg,
        var(--crim) 220deg, #3A1018 275deg,
        var(--crim2) 330deg, var(--crim) 360deg
      );
      animation: spinR 9s linear infinite;
    }
    @keyframes spinR { to { transform:rotate(360deg); } }
    .ring::after { content:''; position:absolute; inset:0; border-radius:50%; background:var(--bg); z-index:0; }
    .rphoto { position:relative; z-index:1; width:100%; height:100%; border-radius:50%; overflow:hidden; border:3px solid var(--bg); }
    .rphoto img { width:100%; height:100%; object-fit:cover; object-position:center top; }

    .eyebrow { font-size:.64rem; letter-spacing:5px; text-transform:uppercase; color:var(--crim2); font-weight:300; }
    h1 { font-family:'Playfair Display',Georgia,serif; font-size:clamp(1.55rem,5.5vw,2.4rem); font-weight:700; line-height:1.1; }
    h1 em { color:var(--crim2); font-style:italic; }
    .tagline { color:var(--dim); font-size:clamp(.76rem,2.5vw,.9rem); font-style:italic; font-weight:300; }

    /* ── wheel ── */
    .wsec { display:flex; flex-direction:column; align-items:center; gap:clamp(16px,4vw,22px); width:100%; }

    .wouter {
      position:relative;
      width: clamp(255px,86vw,390px);
      aspect-ratio:1;
    }
    .wouter::before {
      content:''; position:absolute; inset:-5px; border-radius:50%;
      background: conic-gradient(var(--crim),#2A0810,var(--crim2),#2A0810,var(--crim));
      opacity:.5;
    }
    .wouter::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:6px solid var(--bg); z-index:1; pointer-events:none;
    }
    #wc { position:relative; z-index:2; width:100%; height:100%; border-radius:50%; display:block; }

    /* pointer */
    .ptr { position:absolute; top:-18px; left:50%; transform:translateX(-50%); z-index:10;
      display:flex; flex-direction:column; align-items:center; }
    .ptr-a { width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent;
      border-top:24px solid var(--crim2); filter:drop-shadow(0 0 8px rgba(184,48,80,.8)); }
    .ptr-s { width:3px; height:9px; background:var(--crim2); border-radius:2px; margin-top:-3px; }

    /* spin button */
    .sbtn {
      display:inline-flex; align-items:center; gap:8px;
      padding: clamp(11px,3vw,14px) clamp(32px,8vw,48px);
      font-family:'Raleway',sans-serif; font-size:clamp(.84rem,2.8vw,1rem);
      font-weight:600; letter-spacing:3px; text-transform:uppercase;
      color:var(--text); background:transparent; border:1px solid var(--crim);
      cursor:pointer; position:relative; overflow:hidden;
      transition:color .32s, box-shadow .32s, transform .12s;
    }
    .sbtn::before { content:''; position:absolute; inset:0; background:var(--crim);
      transform:scaleX(0); transform-origin:right; transition:transform .32s ease; }
    .sbtn:hover { color:#fff; box-shadow:0 0 22px rgba(139,26,42,.4); }
    .sbtn:hover::before { transform:scaleX(1); transform-origin:left; }
    .sbtn span { position:relative; z-index:1; }
    .sbtn:active { transform:scale(.96); }
    .sbtn:disabled { opacity:.3; cursor:default; transform:none; box-shadow:none; }
    .sbtn:disabled::before { display:none; }

    /* ── result card ── */
    #result {
      width:100%; background:var(--cbg); border:1px solid var(--cbrd);
      padding: clamp(20px,5vw,28px) clamp(16px,4vw,22px) clamp(24px,6vw,32px);
      display:none; text-align:center; position:relative;
      animation:revCard .6s cubic-bezier(.16,1,.3,1);
    }
    #result::before { content:'❖'; position:absolute; top:9px; right:12px; color:var(--crim); opacity:.4; font-size:.95rem; }
    #result::after  { content:'❖'; position:absolute; bottom:9px; left:12px; color:var(--crim); opacity:.4; font-size:.95rem; }
    @keyframes revCard { from{opacity:0;transform:translateY(18px) scale(.97)} to{opacity:1;transform:none} }
    #result.show { display:block; }

    .reye { font-size:.63rem; letter-spacing:5px; text-transform:uppercase; color:var(--crim2); margin-bottom:8px; }
    #rtitle { font-family:'Playfair Display',Georgia,serif; font-size:clamp(1.75rem,6vw,2.5rem);
      font-weight:700; line-height:1.05; margin-bottom:12px; }
    .rdiv { width:46px; height:1px; margin:0 auto 12px;
      background:linear-gradient(to right,transparent,var(--crim),transparent); }
    #rdesc { color:var(--dim); font-size:clamp(.82rem,2.5vw,.93rem); font-style:italic;
      font-weight:300; line-height:1.65; margin-bottom:20px; }

    .pframe { display:inline-block; padding:8px; border:1px solid rgba(139,26,42,.22); background:rgba(0,0,0,.3); }
    .pimg { width:clamp(108px,35vw,168px); aspect-ratio:1; display:block;
      background-repeat:no-repeat; filter:sepia(.12) contrast(1.05); }

    /* ── mini games ── */
    .msec { width:100%; display:flex; flex-direction:column; gap:clamp(10px,3vw,14px); }
    .mtitle { text-align:center; font-size:.62rem; letter-spacing:4px; text-transform:uppercase; color:var(--dim); }
    .mrow { display:flex; gap:clamp(10px,3vw,14px); width:100%; }

    /* flip card */
    .fc { flex:1; min-height:clamp(82px,20vw,102px); perspective:1000px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .fc-in { position:relative; width:100%; height:100%;
      transform-style:preserve-3d; transition:transform .56s cubic-bezier(.45,.05,.55,.95); }
    .fc.flipped .fc-in { transform:rotateY(180deg); }

    .fc-f, .fc-b {
      position:absolute; inset:0; backface-visibility:hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      border:1px solid rgba(139,26,42,.28); background:var(--cbg); padding:10px 8px;
      transition:border-color .28s, background .28s;
    }
    .fc:hover .fc-f { border-color:rgba(139,26,42,.6); background:rgba(139,26,42,.06); }
    .fc-b { transform:rotateY(180deg); border-color:rgba(184,48,80,.4); background:rgba(139,26,42,.09); }

    .fc-icon  { font-size:clamp(1.1rem,3.5vw,1.4rem); }
    .fc-label { font-size:clamp(.6rem,1.8vw,.7rem); letter-spacing:2px; text-transform:uppercase; color:var(--dim); }
    .fc-hint  { font-size:.54rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--crim); opacity:.6; }
    .fc-res   { font-family:'Playfair Display',Georgia,serif; font-size:clamp(1rem,3.5vw,1.25rem);
      font-weight:700; color:var(--text); text-align:center; line-height:1.2; }
    .fc-sub   { font-size:.55rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); opacity:.7; }

    /* footer */
    .foot { color:var(--dim); font-size:.64rem; letter-spacing:1.5px; text-align:center; opacity:.5; }
  </style>
</head>
<body>

<div class="amb"></div>
<div class="hbg" id="hbg"></div>
<div id="cc"></div>

<div class="page">

  <!-- hero -->
  <header class="hero">
    <div class="ring">
      <div class="rphoto"><img src="2.jpeg" alt=""/></div>
    </div>
    <p class="eyebrow">הלילה שלנו</p>
    <h1>גלגל ה<em>תנוחות</em></h1>
    <p class="tagline">סובבו וגלו מה הלילה מביא...</p>
  </header>

  <!-- wheel -->
  <section class="wsec">
    <div class="wouter">
      <div class="ptr"><div class="ptr-a"></div><div class="ptr-s"></div></div>
      <canvas id="wc"></canvas>
    </div>
    <button class="sbtn" id="sbtn" onclick="spinWheel()">
      <span>✦ &nbsp;סובב&nbsp; ✦</span>
    </button>
  </section>

  <!-- result -->
  <div id="result">
    <p class="reye">הלילה תנסו</p>
    <h2 id="rtitle"></h2>
    <div class="rdiv"></div>
    <p id="rdesc"></p>
    <div class="pframe"><div class="pimg" id="pimg"></div></div>
  </div>

  <!-- mini games -->
  <section class="msec">
    <p class="mtitle">✦ &nbsp; משחקי אקראי &nbsp; ✦</p>
    <div class="mrow">

      <div class="fc" id="fc1" onclick="doFlip(1)">
        <div class="fc-in">
          <div class="fc-f">
            <span class="fc-icon">👆</span>
            <span class="fc-label">מי למעלה?</span>
            <span class="fc-hint">לחץ לגלות</span>
          </div>
          <div class="fc-b">
            <span class="fc-res" id="fc1r"></span>
            <span class="fc-sub">לחץ שוב לאיפוס</span>
          </div>
        </div>
      </div>

      <div class="fc" id="fc2" onclick="doFlip(2)">
        <div class="fc-in">
          <div class="fc-f">
            <span class="fc-icon">🍾</span>
            <span class="fc-label">מה שותים?</span>
            <span class="fc-hint">לחץ לגלות</span>
          </div>
          <div class="fc-b">
            <span class="fc-res" id="fc2r"></span>
            <span class="fc-sub">לחץ שוב לאיפוס</span>
          </div>
        </div>
      </div>

    </div>
  </section>

  <p class="foot">❖ &nbsp; כל סיבוב — הרפתקה חדשה &nbsp; ❖</p>

</div>

<script>
/* ── positions ─────────────────────────────────────────────────────────────
   src   : image file
   cols/rows : grid dimensions of that sprite sheet
   col/row   : 0-based cell index (left-to-right, top-to-bottom)

   background-size  = cols*100% × rows*100%
   background-pos-x = col/(cols-1) * 100%
   background-pos-y = row/(rows-1) * 100%
────────────────────────────────────────────────────────────────────────── */
const POS = [
  // ─── 3.jpg  (3 × 3 realistic line-art) ─────────────────────────────────
  { name:"הטיגריס",        desc:"אנרגיה פראית — חיבוק מאחור עמוק ועוצמתי",          src:"3.jpg", cols:3, rows:3, col:0, row:0 },
  { name:"מאחור בעמידה",  desc:"שליטה, עומק ומגע שמרגיש בכל הגוף",                 src:"3.jpg", cols:3, rows:3, col:1, row:0 },
  { name:"הפרפר",          desc:"פתוחים לגמרי אחד לשני — עמוק ואינטימי",           src:"3.jpg", cols:3, rows:3, col:2, row:0 },
  { name:"הגלשן",          desc:"היא מובילה, הוא נהנה — שליטה רכה וחושנית",         src:"3.jpg", cols:3, rows:3, col:0, row:1 },
  { name:"הלוטוס",         desc:"פנים אל פנים, לב אל לב — תנועה אינטימית",         src:"3.jpg", cols:3, rows:3, col:1, row:1 },
  { name:"מאחור ביישיבה", desc:"כניסה עמוקה, גוף אל גוף, לחישות לאוזן",            src:"3.jpg", cols:3, rows:3, col:2, row:1 },
  { name:"ספוּן",           desc:"שני גופים אחד — חיבוק שלם תוך כדי",               src:"3.jpg", cols:3, rows:3, col:0, row:2 },
  { name:"הקאובויה",       desc:"היא רוכבת הפוך — כוח, שליטה ורטט עמוק",           src:"3.jpg", cols:3, rows:3, col:1, row:2 },
  { name:"הרוכבת",         desc:"היא מעל, קובעת את הקצב — בלתי נשכח",              src:"3.jpg", cols:3, rows:3, col:2, row:2 },
  // ─── 1.png  (4 × 4 colourful stick-figures) ─────────────────────────────
  { name:"המיסיונרית",     desc:"קלאסיקה שאף פעם לא יוצאת מהאופנה",                src:"1.png", cols:4, rows:4, col:0, row:0 },
  { name:"הכלבלב",         desc:"עוצמה, קרבה וכניסה עמוקה מאחורה",                 src:"1.png", cols:4, rows:4, col:1, row:0 },
  { name:"עמידה",           desc:"ספונטני, מרגש — כאן ועכשיו, ממש ככה",             src:"1.png", cols:4, rows:4, col:3, row:0 },
  { name:"הכסא",            desc:"ישיבה נוחה, כניסה עמוקה, מבטים נועלים",          src:"1.png", cols:4, rows:4, col:1, row:1 },
  { name:"הנדנדה",          desc:"קצב, תנועה ורטט — כמו רכבת הרים פרטית",          src:"1.png", cols:4, rows:4, col:2, row:1 },
  { name:"הספה",            desc:"צד אל צד, עמוק ונוח — לא זזים מכאן",             src:"1.png", cols:4, rows:4, col:0, row:2 },
  { name:"69",               desc:"תן וקח במקביל — הכי הוגן שיש",                   src:"1.png", cols:4, rows:4, col:2, row:2 },
];

function bpos(p) {
  const x = (p.cols === 1) ? 0 : p.col / (p.cols - 1) * 100;
  const y = (p.rows === 1) ? 0 : p.row / (p.rows - 1) * 100;
  return `${x.toFixed(1)}% ${y.toFixed(1)}%`;
}

/* ── wheel ─────────────────────────────────────────────────────────────── */
// Deep dark segments: slight warm/cool alternation for subtle contrast
const SEGCOL = [
  '#1E0C10','#0C0C1E','#1C0C12','#0C121A',
  '#1E0C10','#0C0C1E','#1C0C12','#0C121A',
  '#1E0C10','#0C0C1E','#1C0C12','#0C121A',
  '#1E0C10','#0C0C1E','#1C0C12','#0C121A',
];

const canvas = document.getElementById('wc');
const ctx    = canvas.getContext('2d');
const N      = POS.length;
const ARC    = (2 * Math.PI) / N;
let   angle  = 0, spinning = false;

function resize() {
  const s = canvas.parentElement.offsetWidth;
  canvas.width = canvas.height = s;
  drawWheel(angle);
}

function drawWheel(rot) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < N; i++) {
    const s = rot + i * ARC, e = s + ARC, m = s + ARC / 2;

    // base fill
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
    ctx.fillStyle = SEGCOL[i % SEGCOL.length];
    ctx.fill();

    // radial sheen
    const g = ctx.createRadialGradient(cx, cy, r * .18, cx, cy, r);
    g.addColorStop(0, 'rgba(255,255,255,.055)');
    g.addColorStop(1, 'rgba(0,0,0,.4)');
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
    ctx.fillStyle = g; ctx.fill();

    // crimson dividers
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
    ctx.strokeStyle = 'rgba(139,26,42,.38)'; ctx.lineWidth = 1.2; ctx.stroke();

    // label
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(m); ctx.textAlign = 'right';
    const fs = Math.max(9, canvas.width * .026);
    ctx.font = `600 ${fs}px "Segoe UI",Arial,sans-serif`;
    ctx.fillStyle = '#D8C5C0';
    ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 8;
    ctx.fillText(POS[i].name, r - 11, fs * .4);
    ctx.restore();
  }

  // outer rim
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(139,26,42,.5)'; ctx.lineWidth = 2; ctx.stroke();

  // center disc
  const cd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * .13);
  cd.addColorStop(0, '#200A12'); cd.addColorStop(1, '#0A0808');
  ctx.beginPath(); ctx.arc(cx, cy, r * .13, 0, 2 * Math.PI);
  ctx.fillStyle = cd; ctx.fill();
  ctx.strokeStyle = 'rgba(139,26,42,.6)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = `${r * .09}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0; ctx.fillStyle = '#B03050';
  ctx.fillText('❤', cx, cy);
}

/* ── spin ── */
function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('sbtn').disabled = true;
  document.getElementById('result').classList.remove('show');

  const total = (7 + Math.floor(Math.random() * 4)) * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const dur   = 5000 + Math.random() * 1800;
  const t0    = performance.now(), a0 = angle;
  const ease  = t => 1 - Math.pow(1 - t, 4.5);

  (function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    angle = a0 + total * ease(t);
    drawWheel(angle);
    if (t < 1) { requestAnimationFrame(frame); }
    else {
      angle %= 2 * Math.PI;
      spinning = false;
      document.getElementById('sbtn').disabled = false;
      showResult();
    }
  })(t0);
}

/* ── result ── */
function showResult() {
  let norm = ((-Math.PI / 2 - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const p  = POS[Math.floor(norm / ARC) % N];

  document.getElementById('rtitle').textContent = p.name;
  document.getElementById('rdesc').textContent  = p.desc;

  const img = document.getElementById('pimg');
  img.style.backgroundImage    = `url('${p.src}')`;
  img.style.backgroundSize     = `${p.cols * 100}% ${p.rows * 100}%`;
  img.style.backgroundPosition = bpos(p);

  const card = document.getElementById('result');
  card.classList.add('show');
  launchConfetti();
  setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
}

/* ── flip cards ── */
const OPTS = {
  1: ['את 💋', 'אתה 🔥'],
  2: ["צ'ייסר 🥃", 'יין 🍷'],
};

function doFlip(id) {
  const card = document.getElementById(`fc${id}`);
  if (card.classList.contains('flipped')) {
    card.classList.remove('flipped');
    return;
  }
  const opts = OPTS[id];
  document.getElementById(`fc${id}r`).textContent = opts[Math.floor(Math.random() * opts.length)];
  card.classList.add('flipped');
}

/* ── confetti ── */
function launchConfetti() {
  const c = document.getElementById('cc');
  c.innerHTML = '';
  const pal = ['#8B1A2A','#C03050','#E0D0D5','#fff','#3A0818','#6B1030'];
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.left       = Math.random() * 100 + 'vw';
    p.style.background = pal[i % pal.length];
    const w = 4 + Math.random() * 6;
    p.style.width = w + 'px'; p.style.height = w + 'px';
    p.style.borderRadius = Math.random() > .5 ? '50%' : '1px';
    const d = 1.8 + Math.random() * 2.2;
    p.style.animationDuration = d + 's';
    p.style.animationDelay    = Math.random() * .7 + 's';
    c.appendChild(p);
    setTimeout(() => p.remove(), (d + 1) * 1000);
  }
}

/* ── hearts ── */
function initHearts() {
  const bg    = document.getElementById('hbg');
  const items = ['❤️','🖤','💋','🌹','❤️','❤️','💔','💋','🌹'];
  for (let i = 0; i < 24; i++) {
    const h = document.createElement('span');
    h.className = 'hrt';
    h.textContent = items[Math.floor(Math.random() * items.length)];
    h.style.left              = Math.random() * 100 + 'vw';
    h.style.fontSize          = (7 + Math.random() * 13) + 'px';
    h.style.animationDuration = (10 + Math.random() * 14) + 's';
    h.style.animationDelay    = (Math.random() * 18) + 's';
    bg.appendChild(h);
  }
}

/* ── init ── */
resize();
initHearts();
window.addEventListener('resize', resize);
</script>
</body>
</html>
